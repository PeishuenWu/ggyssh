<!DOCTYPE html>
<html>
<head>
    <title>GgySSH Bridge</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Xterm -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx-preview@0.3.3/dist/docx-preview.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --bottom-bar-h: 0px; }
        body { background: #121212; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Centered Login Screen */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #121212; display: flex; align-items: center; justify-content: center; z-index: 2000; 
        }
        #login-card { 
            width: 95%; max-width: 400px; padding: 1.5rem; background: #1e1e1e; 
            border-radius: 8px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #login-card .form-label { margin-bottom: 0.25rem; }
        #login-card .mb-3 { margin-bottom: 1rem !important; }
        #auth-gate-status { min-height: 1.2rem; }
        
        /* Main Layout (hidden until login) */
        #main-container { height: calc(100vh - var(--bottom-bar-h)); min-height: 0; flex: none; display: flex; overflow: hidden; position: relative; background: #000; }
        #terminal-area { flex: 3; display: flex; flex-direction: column; overflow: hidden; min-width: 200px; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            #resizer { display: none !important; }
            #file-explorer {
                position: absolute; top: 0; right: 0; width: 85% !important; height: 100%;
                z-index: 1100; border-left: 1px solid #444;
                box-shadow: -10px 0 20px rgba(0,0,0,0.5);
                transition: transform 0.3s ease;
            }
            #file-explorer.hidden {
                display: flex !important;
                transform: translateX(105%);
            }
            #terminal-area { width: 100% !important; flex: none; }
            .nav-link span { max-width: 80px !important; }
        }
        #terminal-tabs-bar { 
            background: #1e1e1e; border-bottom: 1px solid #333; 
            display: flex; align-items: center; padding: 0 5px;
        }
        #terminal-tabs { border-bottom: none; }
        #terminal-tabs .nav-link { 
            color: #aaa; border: none; border-radius: 0; padding: 5px 15px; 
            font-size: 0.75rem; transition: all 0.2s;
        }
        #terminal-tabs .nav-link.active { background: #000; color: #fff; border-bottom: 2px solid #0d6efd; }
        #terminal-tabs .nav-link:hover:not(.active) { background: #2a2a2a; color: #eee; }
        #terminal-container { flex: 1; position: relative; overflow: hidden; background: #000; }
        .terminal-instance { position: absolute; top: 0; left: 0; right: 0; bottom: 0; visibility: hidden; padding: 10px 10px 18px 10px; box-sizing: border-box; }
        .terminal-instance.active { visibility: visible; }
        .preview-instance { position: absolute; top: 0; left: 0; right: 0; bottom: 0; visibility: hidden; background: #000; overflow: auto; display: flex; align-items: center; justify-content: center; }
        .preview-instance.active { visibility: visible; }
        .preview-instance.editor-mode { display: block; padding: 0.75rem; }
        .preview-instance img, .preview-instance video { max-width: 100%; max-height: 100%; }
        .preview-instance iframe { width: 100%; height: 100%; border: none; }
        .pdf-preview-wrap { width: 100%; height: 100%; display: flex; flex-direction: column; gap: 0.5rem; padding: 0.75rem; }
        .pdf-preview-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
        .pdf-preview-status { color: #9aa4b2; font-size: 0.8rem; min-height: 1.1rem; }
        .pdf-preview-frame { flex: 1; width: 100%; border: 1px solid #2f3541; border-radius: 6px; background: #0f1115; }
        .office-preview-wrap { width: 100%; height: 100%; display: flex; flex-direction: column; gap: 0.5rem; padding: 0.75rem; }
        .office-preview-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
        .office-preview-status { color: #9aa4b2; font-size: 0.8rem; min-height: 1.1rem; }
        .office-preview-body { flex: 1; min-height: 0; overflow: auto; border: 1px solid #2f3541; border-radius: 6px; background: #0f1115; padding: 0.75rem; }
        .xlsx-sheet-tabs { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
        .xlsx-sheet-tabs .btn.active { border-color: #0d6efd; color: #8ab4f8; }
        .xlsx-table-wrap { overflow: auto; max-height: calc(100% - 2.5rem); border: 1px solid #2f3541; border-radius: 6px; }
        .xlsx-table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .xlsx-table th, .xlsx-table td { border: 1px solid #2f3541; padding: 0.25rem 0.45rem; white-space: nowrap; }
        .xlsx-table th { background: #11141a; color: #8ab4f8; position: sticky; top: 0; z-index: 1; }
        .md-viewer { flex: 1; min-height: 0; overflow: auto; border: 1px solid #2f3541; border-radius: 6px; background: #0f1115; padding: 1rem; color: #e6edf3; line-height: 1.55; }
        .md-viewer h1, .md-viewer h2, .md-viewer h3, .md-viewer h4, .md-viewer h5, .md-viewer h6 { margin-top: 1.1em; margin-bottom: 0.5em; line-height: 1.3; }
        .md-viewer h1, .md-viewer h2 { border-bottom: 1px solid #2f3541; padding-bottom: 0.25em; }
        .md-viewer p { margin: 0.6em 0; }
        .md-viewer ul, .md-viewer ol { padding-left: 1.4em; }
        .md-viewer pre { background: #0b0d11; border: 1px solid #2f3541; border-radius: 6px; padding: 0.65rem; overflow: auto; }
        .md-viewer code { font-family: Menlo, Monaco, "Courier New", monospace; font-size: 0.83rem; }
        .md-viewer blockquote { margin: 0.75em 0; border-left: 3px solid #4d5562; padding: 0.4em 0.8em; color: #b8c0cc; }
        .md-viewer table { width: 100%; border-collapse: collapse; margin: 0.8em 0; }
        .md-viewer th, .md-viewer td { border: 1px solid #2f3541; padding: 0.35rem 0.5rem; text-align: left; }
        .md-viewer .mermaid { background: #0b0d11; border: 1px solid #2f3541; border-radius: 6px; padding: 0.5rem; overflow-x: auto; }
        .md-viewer .mermaid-error { border: 1px solid #6b2c31; background: #2c1317; color: #ffb4b4; border-radius: 6px; padding: 0.5rem; font-size: 0.8rem; white-space: pre-wrap; }
        .text-editor-wrap { height: 100%; display: flex; flex-direction: column; gap: 0.5rem; }
        .text-editor-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
        .text-editor-name { color: #8ab4f8; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .text-editor-dir { color: #7d8590; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 45%; }
        .text-editor-filename { max-width: 280px; }
        .text-editor-status { font-size: 0.75rem; color: #aaa; min-height: 1.1rem; }
        .text-editor-body { flex: 1; min-height: 0; display: flex; }
        .text-editor-lines-wrap { width: 54px; background: #0b0d11; border: 1px solid #2f3541; border-right: none; border-radius: 6px 0 0 6px; overflow: hidden; }
        .text-editor-lines { margin: 0; padding: 0.75rem 0.5rem; color: #6e7681; font-family: Menlo, Monaco, "Courier New", monospace; font-size: 1.3rem; line-height: 1.45; text-align: right; user-select: none; pointer-events: none; }
        .text-editor-area { flex: 1; width: 100%; background: #0f1115; color: #e6edf3; border: 1px solid #2f3541; border-left: none; border-radius: 0 6px 6px 0; padding: 0.75rem; resize: none; font-family: Menlo, Monaco, "Courier New", monospace; font-size: 1.3rem; line-height: 1.45; }
        .text-editor-area:focus { outline: none; border-color: #0d6efd; box-shadow: 0 0 0 2px rgba(13,110,253,0.15); }
        
        /* Resizer */
        #resizer {
            width: 4px;
            cursor: col-resize;
            background: #333;
            transition: background 0.2s;
            z-index: 10;
        }
        #resizer:hover, #resizer.dragging {
            background: #0d6efd;
        }
        
        /* File Explorer */
        #file-explorer { flex: 1; background: #1e1e1e; border-left: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; min-width: 150px; position: relative; }
        #file-explorer.drag-over { background: rgba(13, 110, 253, 0.05); }
        #file-explorer.drag-over::after {
            content: 'Drop to upload to this folder';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13, 110, 253, 0.1);
            border: 2px dashed #0d6efd;
            display: flex; align-items: center; justify-content: center;
            color: #0d6efd; font-weight: bold; pointer-events: none; z-index: 100;
        }
        #explorer-header { padding: 0.5rem 0.75rem; background: #252525; border-bottom: 1px solid #333; }
        #current-path { font-size: 0.75rem; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 4px; }
        #explorer-list { flex: 1; overflow-y: auto; }

        /* Progress Bar */
        #upload-progress-bar {
            height: 30px;
            background: #252525;
            border-top: 1px solid #333;
            display: none;
            align-items: center;
            padding: 0 10px;
            font-size: 0.75rem;
        }
        #progress-inner {
            height: 4px;
            background: #444;
            border-radius: 2px;
            flex: 1;
            margin: 0 10px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            background: #0d6efd;
            width: 0%;
            transition: width 0.1s;
        }
        
        /* List View Items */
        #explorer-list.list-view .file-item { 
            padding: 0.4rem 0.75rem; display: flex; align-items: center; gap: 0.5rem; 
            cursor: pointer; border-bottom: 1px solid #2a2a2a; font-size: 0.875rem;
            transition: background 0.1s;
        }
        #explorer-list.list-view .file-item:hover { background: #2a2a2a; }
        #explorer-list.list-view .file-item .icon { font-size: 1rem; width: 1.25rem; text-align: center; }
        #explorer-list.list-view .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #explorer-list.list-view .file-item .size { color: #888; font-size: 0.75rem; }
        #explorer-list.list-view .file-item .actions { visibility: hidden; display: flex; gap: 5px; }
        #explorer-list.list-view .file-item:hover .actions { visibility: visible; }
        .item-checkbox { cursor: pointer; }
        .thumbnail-img { 
            width: 100%; height: 100%; object-fit: cover; border-radius: 2px;
            background: #000;
        }
        #explorer-list.list-view .icon .thumbnail-img {
            width: 20px; height: 20px;
        }

        /* Grid View Items */
        #explorer-list.grid-view { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.75rem; align-content: flex-start; }
        #explorer-list.grid-view .file-item { 
            width: 90px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 0.5rem; cursor: pointer; border-radius: 0.375rem; position: relative;
            transition: background 0.1s;
        }
        #explorer-list.grid-view .file-item:hover { background: #2a2a2a; }
        #explorer-list.grid-view .file-item .item-checkbox { position: absolute; top: 5px; left: 5px; z-index: 5; }
        #explorer-list.grid-view .file-item .actions { position: absolute; top: 5px; right: 5px; visibility: hidden; z-index: 5; }
        #explorer-list.grid-view .file-item:hover .actions { visibility: visible; }
        #explorer-list.grid-view .file-item .icon { font-size: 2rem; margin-bottom: 0.25rem; }
        #explorer-list.grid-view .file-item .name { 
            font-size: 0.75rem; width: 100%; overflow: hidden; text-overflow: ellipsis; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; 
            line-height: 1.2; height: 2.4em; text-align: center;
        }
        #explorer-list.grid-view .file-item .actions { position: absolute; top: 2px; right: 2px; visibility: hidden; }
        #explorer-list.grid-view .file-item:hover .actions { visibility: visible; }

        .xterm-viewport { background-color: #000 !important; }
        .hidden { display: none !important; }
        
        #bottom-control-bar {
            height: 32px;
            background: #1e1e1e;
            border-top: 1px solid #333;
            display: none; /* Shown after connect */
            align-items: center;
            padding: 0 10px;
            z-index: 1000;
        }
        
        /* Bootstrap Overrides for Dark Theme */
        .form-control, .form-select { background-color: #2a2a2a; border-color: #444; color: #eee; }
        .form-control:focus, .form-select:focus { background-color: #333; border-color: #0d6efd; color: #fff; box-shadow: none; }
        .btn-outline-secondary { color: #aaa; border-color: #444; }
        .btn-outline-secondary:hover { background-color: #333; border-color: #555; color: #fff; }

        /* Unified font size for right explorer panel */
        #file-explorer,
        #file-explorer .form-control,
        #file-explorer .form-select,
        #file-explorer .btn,
        #file-explorer .small,
        #file-explorer .file-item,
        #file-explorer .size,
        #file-explorer .name {
            font-size: 1.2rem !important;
        }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div id="login-card">
            <h4 class="text-center mb-4 text-primary"><i class="bi bi-shield-lock-fill me-2"></i>GgySSH Login</h4>

            <div id="auth-gate" class="hidden">
                <div class="text-center mb-3">
                    <div class="text-secondary small mb-3">Security key verification is required before SSH access.</div>
                    <button class="btn btn-primary w-100 py-2 mb-2" onclick="webauthnLogin()">
                        <i class="bi bi-key-fill me-2"></i>Use Security Key
                    </button>
                    <a class="btn btn-outline-secondary w-100 py-2" href="/admin/">
                        <i class="bi bi-sliders me-2"></i>Admin
                    </a>
                    <div id="auth-gate-status" class="small text-secondary mt-3"></div>
                </div>
            </div>

            <div id="ssh-login-form">
            <div class="mb-3">
                <label class="form-label small text-secondary">SSH Host</label>
                <select id="host-select" class="form-select"></select>
            </div>

            <div class="mb-3">
                <label class="form-label small text-secondary">Username</label>
                <input id="user" class="form-control" placeholder="Username" />
            </div>

            <div class="mb-3">
                <label class="form-label small text-secondary">Auth Type</label>
                <select id="auth_type" class="form-select" onchange="toggleAuth()">
                    <option value="key">Private Key</option>
                    <option value="password">Password</option>
                </select>
            </div>

            <div id="password-input" class="mb-3 hidden">
                <label class="form-label small text-secondary">Password</label>
                <input id="pass" class="form-control" placeholder="Password" type="password" />
            </div>

            <div id="key-input" class="mb-3">
                <label class="form-label small text-secondary">Private Key</label>
                <textarea id="key" class="form-control" style="height: 80px;" placeholder="Paste Private Key..."></textarea>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="remember_me">
                <label class="form-check-label small text-secondary" for="remember_me">Remember Me</label>
            </div>

            <button class="btn btn-primary w-100 py-2" onclick="connect()">
                <i class="bi bi-plug-fill me-2"></i>Connect
            </button>
            <a class="btn btn-outline-secondary w-100 py-2 mt-2" href="/admin/">
                <i class="bi bi-sliders me-2"></i>Admin
            </a>
            </div>
        </div>
    </div>

    <div id="main-container">
        <div id="terminal-area">
            <div id="terminal-tabs-bar">
                <ul class="nav nav-tabs" id="terminal-tabs" role="tablist">
                    <!-- Tabs will be injected here -->
                </ul>
                <button class="btn btn-link btn-sm text-secondary p-0 ms-2" onclick="addTab()" title="New Session">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </div>
            <div id="terminal-container">
                <!-- Terminal instances will be injected here -->
            </div>
        </div>
        <div id="resizer" class="hidden"></div>
        <div id="file-explorer" class="hidden">
            <div id="explorer-header">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <div class="d-flex flex-grow-1 me-2 align-items-center">
                        <button onclick="goHome()" class="btn btn-outline-secondary py-0 px-2 me-1" title="Go to Home" style="height: 24px; display: flex; align-items: center;">
                            <i class="bi bi-house-fill" style="font-size: 0.75rem;"></i>
                        </button>
                        <button onclick="syncTerminalPath()" class="btn btn-outline-info py-0 px-2 me-1" title="Sync terminal to this path" style="height: 24px; display: flex; align-items: center;">
                            <i class="bi bi-box-arrow-in-right" style="font-size: 0.75rem;"></i>
                        </button>
                        <input type="text" id="file-filter" class="form-control form-control-sm py-0 px-2 flex-grow-1" 
                               placeholder="Filter..." style="height: 24px; font-size: 0.75rem; background: #121212; border-color: #444;"
                               oninput="renderFileList(cachedFiles)">
                    </div>
                    <div class="btn-group btn-group-sm flex-shrink-0">
                        <input type="file" id="fileInput" class="hidden" />
                        <button onclick="openNewTextFileModal()" class="btn btn-outline-primary py-0 px-2" title="New Text File">
                            <i class="bi bi-file-earmark-plus"></i>
                        </button>
                        <button onclick="document.getElementById('fileInput').click()" class="btn btn-outline-success py-0 px-2" title="Upload File">
                            <i class="bi bi-cloud-upload"></i>
                        </button>
                        <button onclick="deleteSelected()" class="btn btn-outline-danger py-0 px-2 hidden" id="btn-delete-selected" title="Delete Selected">
                            <i class="bi bi-trash-fill"></i>
                        </button>
                        <button onclick="toggleHiddenFiles()" class="btn btn-outline-secondary py-0 px-2" id="btn-toggle-hidden" title="Toggle Hidden Files">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                        <button onclick="toggleThumbnails()" class="btn btn-outline-secondary py-0 px-2" id="btn-toggle-thumbnails" title="Toggle Image Previews">
                            <i class="bi bi-image"></i>
                        </button>
                        <button onclick="setViewMode('list')" class="btn btn-outline-secondary py-0 px-2" id="btn-list-view" title="List View">
                            <i class="bi bi-list"></i>
                        </button>
                        <button onclick="setViewMode('grid')" class="btn btn-outline-secondary py-0 px-2" id="btn-grid-view" title="Grid View">
                            <i class="bi bi-grid-3x3-gap"></i>
                        </button>
                        <button onclick="refreshFiles()" class="btn btn-outline-secondary py-0 px-2" title="Refresh">
                            <i class="bi bi-arrow-clockwise"></i>
                        </button>
                    </div>
                </div>
                <!-- Hidden but functional inputs for upload logic compatibility -->
                <input type="hidden" id="remotePath" />
                <input type="checkbox" id="autoInputPath" checked class="hidden" />
            </div>
            <div id="explorer-list" class="list-view"></div>
            <!-- Bottom Progress Bar -->
            <div id="upload-progress-bar">
                <span id="upload-status-text" style="min-width: 80px;">Ready</span>
                <div id="progress-inner">
                    <div id="progress-fill"></div>
                </div>
                <span id="upload-percent">0%</span>
            </div>
        </div>
    </div>

    <div id="bottom-control-bar" class="d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center text-truncate me-2" style="max-width: 60%;">
            <i class="bi bi-folder2 text-info me-2"></i>
            <span id="current-path-display" class="small text-secondary text-truncate" title="/">/</span>
        </div>
        <div class="d-flex align-items-center">
            <button class="btn btn-link btn-sm p-0 text-danger text-decoration-none me-3" onclick="logout()" title="Logout">
                <i class="bi bi-box-arrow-right"></i> <span class="small ms-1 d-none d-md-inline">Logout</span>
            </button>
            <button id="explorer-toggle-btn" class="btn btn-link btn-sm p-0 text-primary text-decoration-none flex-shrink-0" onclick="toggleExplorer()" title="Toggle File Explorer">
                <span class="small me-1">Explorer</span> <i class="bi bi-folder2-open"></i>
            </button>
        </div>
    </div>

    <div class="modal fade" id="newTextFileModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content bg-dark text-light border-secondary">
                <div class="modal-header border-secondary py-2">
                    <h6 class="modal-title mb-0">New Text File</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label small text-secondary">File Name</label>
                    <input id="new-text-filename" class="form-control form-control-sm mb-2" placeholder="untitled" />
                    <label class="form-label small text-secondary">Type</label>
                    <select id="new-text-ext" class="form-select form-select-sm">
                        <option value="txt">txt</option>
                        <option value="md">md</option>
                        <option value="py">py</option>
                        <option value="html">html</option>
                        <option value="js">js</option>
                        <option value="css">css</option>
                    </select>
                    <div class="small text-secondary mt-2 text-truncate" id="new-text-target-path"></div>
                </div>
                <div class="modal-footer border-secondary py-2">
                    <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-sm btn-primary" onclick="createNewTextFile()">Create</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let webauthnEnabled = false;
        let ssoEnabled = false;

        function b64urlToBuffer(value) {
            if (!value) return new ArrayBuffer(0);
            const base64 = value.replace(/-/g, '+').replace(/_/g, '/').padEnd(Math.ceil(value.length / 4) * 4, '=');
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return bytes.buffer;
        }

        function bufferToB64url(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            bytes.forEach(b => binary += String.fromCharCode(b));
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
        }

        function publicKeyCredentialToJSON(credential, sessionId, extra = {}) {
            const response = credential.response;
            const payload = {
                session_id: sessionId,
                id: credential.id,
                rawId: bufferToB64url(credential.rawId),
                type: credential.type,
                response: {
                    clientDataJSON: bufferToB64url(response.clientDataJSON)
                },
                ...extra
            };
            if (response.attestationObject) payload.response.attestationObject = bufferToB64url(response.attestationObject);
            if (response.authenticatorData) payload.response.authenticatorData = bufferToB64url(response.authenticatorData);
            if (response.signature) payload.response.signature = bufferToB64url(response.signature);
            if (response.userHandle) payload.response.userHandle = bufferToB64url(response.userHandle);
            return payload;
        }

        function prepareCreationOptions(options) {
            const publicKey = options.publicKey || options.response?.publicKey || options;
            publicKey.challenge = b64urlToBuffer(publicKey.challenge);
            publicKey.user.id = b64urlToBuffer(publicKey.user.id);
            if (publicKey.excludeCredentials) {
                publicKey.excludeCredentials = publicKey.excludeCredentials.map(c => ({ ...c, id: b64urlToBuffer(c.id) }));
            }
            return publicKey;
        }

        function prepareRequestOptions(options) {
            const publicKey = options.publicKey || options.response?.publicKey || options;
            publicKey.challenge = b64urlToBuffer(publicKey.challenge);
            if (publicKey.allowCredentials) {
                publicKey.allowCredentials = publicKey.allowCredentials.map(c => ({ ...c, id: b64urlToBuffer(c.id) }));
            }
            return publicKey;
        }

        function setAuthGateStatus(message, isError = false) {
            const status = document.getElementById('auth-gate-status');
            if (!status) return;
            status.textContent = message || '';
            status.classList.toggle('text-danger', isError);
            status.classList.toggle('text-secondary', !isError);
        }

        async function refreshAuthGate() {
            try {
                const res = await fetch('/auth/status', { credentials: 'same-origin' });
                const data = await res.json();
                webauthnEnabled = !!data.enabled;
                ssoEnabled = !!data.sso_enabled;
                const gate = document.getElementById('auth-gate');
                const form = document.getElementById('ssh-login-form');
                if (!webauthnEnabled || data.authenticated) {
                    gate.classList.add('hidden');
                    form.classList.remove('hidden');
                } else {
                    gate.classList.remove('hidden');
                    form.classList.add('hidden');
                    setAuthGateStatus(data.bootstrap_available ? 'Open Admin to register the first security key.' : '');
                }
            } catch (e) {
                console.error('Auth status failed', e);
            }
        }

        async function webauthnLogin() {
            if (!window.PublicKeyCredential) {
                setAuthGateStatus('This browser does not support WebAuthn.', true);
                return;
            }
            try {
                setAuthGateStatus('Waiting for security key...');
                const begin = await fetch('/auth/login/begin', { method: 'POST', credentials: 'same-origin' });
                if (!begin.ok) throw new Error(await begin.text());
                const data = await begin.json();
                const credential = await navigator.credentials.get({ publicKey: prepareRequestOptions(data.options) });
                const finish = await fetch('/auth/login/finish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(publicKeyCredentialToJSON(credential, data.session_id))
                });
                if (!finish.ok) throw new Error(await finish.text());
                if (ssoEnabled) {
                    setAuthGateStatus('Security key accepted. Opening SSH session...');
                    const ok = await trySSOLogin();
                    if (ok) return;
                }
                setAuthGateStatus('');
                await refreshAuthGate();
            } catch (e) {
                setAuthGateStatus(e.message || 'Security key login failed.', true);
            }
        }

        async function trySSOLogin() {
            try {
                const resp = await fetch('login/sso', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: '{}'
                });
                if (!resp.ok) throw new Error(await resp.text());
                const data = await resp.json();
                sid = data.sid;
                homeRoot = normalizePath(data.home_root || `/home/${data.user || 'codex'}`);
                afterLogin(homeRoot, homeRoot);
                return true;
            } catch (e) {
                setAuthGateStatus(`SSO failed: ${e.message}. Use manual SSH login.`, true);
                await refreshAuthGate();
                return false;
            }
        }

        function toggleAuth() {
            const type = document.getElementById('auth_type').value;
            document.getElementById('password-input').classList.toggle('hidden', type === 'key');
            document.getElementById('key-input').classList.toggle('hidden', type === 'password');
        }

        let tabs = {}; // { id: { term, socket, fitAddon, element } }
        let activeTabId = null;
        let tabCounter = 0;
        let sid = null;
        let remotePathTouched = false;
        let droppedFile = null;
        let isUploading = false;
        let lastTerminalWidth = null;
        const textEncoder = new TextEncoder();
        let previewEditorCounter = 0;
        let newTextFileModal = null;
        let mermaidInitialized = false;
        let previewIndex = new Map(); // normalizedPath -> tabId

        function updateBottomBarHeight() {
            const bar = document.getElementById('bottom-control-bar');
            const h = bar && bar.style.display !== 'none' ? bar.offsetHeight : 0;
            document.documentElement.style.setProperty('--bottom-bar-h', `${h || 0}px`);
        }

        function fitTerminalById(id) {
            if (!id || !tabs[id] || tabs[id].type !== 'terminal') return;
            const t = tabs[id];
            requestAnimationFrame(() => {
                t.fitAddon.fit();
                sendResize(id);
                setTimeout(() => {
                    if (tabs[id] && tabs[id].type === 'terminal') {
                        tabs[id].fitAddon.fit();
                        sendResize(id);
                    }
                }, 50);
            });
        }

        function fitActiveTerminal() {
            fitTerminalById(activeTabId);
        }

        function logout() {
            Object.keys(tabs).forEach(id => closeTab(id));
            previewIndex.clear();
            tabCounter = 0;
            sid = null;
            document.getElementById('login-overlay').classList.remove('hidden');
            document.getElementById('bottom-control-bar').style.display = 'none';
            document.getElementById('file-explorer').classList.add('hidden');
            document.getElementById('resizer').classList.add('hidden');
            updateBottomBarHeight();
        }

        function addTab(type = 'terminal', previewData = null) {
            if (!sid) return;
            const id = 'tab-' + (++tabCounter);
            const title = type === 'terminal' ? `Session ${tabCounter}` : `Preview: ${previewData.name}`;
            const icon = type === 'terminal' ? 'bi bi-terminal' : 'bi bi-eye';
            
            const tabList = document.getElementById('terminal-tabs');
            const tabItem = document.createElement('li');
            tabItem.className = 'nav-item';
            tabItem.id = `nav-item-${id}`;
            tabItem.innerHTML = `
                <div class="nav-link d-flex align-items-center" id="link-${id}" onclick="switchTab('${id}')" title="${title}">
                    <i class="${icon} me-2 small"></i>
                    <span class="text-truncate" style="max-width: 120px;">${title}</span>
                    <i class="bi bi-x ms-2" onclick="event.stopPropagation(); closeTab('${id}')" style="cursor: pointer;"></i>
                </div>
            `;
            tabList.appendChild(tabItem);

            const container = document.getElementById('terminal-container');
            const instanceElem = document.createElement('div');
            instanceElem.id = `instance-${id}`;
            instanceElem.className = type === 'terminal' ? 'terminal-instance' : 'preview-instance';
            container.appendChild(instanceElem);

            let tabObj = { id, type, element: instanceElem };
            if (type === 'preview' && previewData && previewData.path) {
                tabObj.previewPath = previewData.path;
                tabObj.previewKey = getPreviewKey(previewData.path);
            }

            if (type === 'terminal') {
                const term = new Terminal({ 
                    theme: { background: '#000' }, 
                    cursorBlink: true,
                    fontFamily: 'Menlo, Monaco, "Courier New", monospace',
                    fontSize: 19,
                    lineHeight: 1.2
                });
                const fitAddon = new FitAddon.FitAddon();
                term.loadAddon(fitAddon);
                term.open(instanceElem);
                instanceElem.addEventListener('click', () => term.focus());

                const baseUrl = new URL('.', window.location.href);
                const wsUrl = new URL('ws', baseUrl);
                wsUrl.searchParams.set('sid', sid);
                wsUrl.protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const socket = new WebSocket(wsUrl.toString());
                socket.binaryType = 'arraybuffer';

                socket.onmessage = (e) => {
                    term.write(typeof e.data === 'string' ? e.data : new Uint8Array(e.data));
                };
                socket.onclose = () => {
                    setTimeout(() => closeTab(id), 500);
                };
                socket.onopen = () => fitTerminalById(id);

                term.onData(data => {
                    if (socket.readyState === WebSocket.OPEN) {
                        socket.send(textEncoder.encode(data));
                    }
                });

                tabObj = { ...tabObj, term, socket, fitAddon };
            } else {
                renderPreview(instanceElem, previewData);
            }

            tabs[id] = tabObj;
            if (type === 'preview' && tabObj.previewKey) {
                previewIndex.set(tabObj.previewKey, id);
            }
            switchTab(id);
        }

        function isPreviewSupportedExt(ext) {
            return ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'mp4', 'webm', 'ogg', 'mp3', 'wav', 'pdf', 'docx', 'xlsx'].includes(ext);
        }

        function isEditableTextExt(ext) {
            return ['txt', 'py', 'md', 'html', 'htm', 'js', 'css'].includes(ext);
        }

        function escapeHtml(s) {
            return String(s || '').replace(/[&<>"']/g, (c) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[c]));
        }

        function splitRemotePath(fullPath) {
            const idx = fullPath.lastIndexOf('/');
            if (idx < 0) return { dir: '.', name: fullPath };
            if (idx === 0) return { dir: '/', name: fullPath.slice(1) };
            return { dir: fullPath.slice(0, idx), name: fullPath.slice(idx + 1) };
        }

        function joinRemotePath(dir, name) {
            if (!dir || dir === '.') return name;
            if (dir === '/') return `/${name}`;
            return `${dir}/${name}`;
        }

        function getPreviewKey(pathStr) {
            return normalizePath(pathStr || '/');
        }

        function updatePreviewIndexForTab(container, oldPath, newPath) {
            if (!container) return;
            const tabId = container.id.replace('instance-', '');
            if (!tabId) return;
            const oldKey = oldPath ? getPreviewKey(oldPath) : '';
            const newKey = newPath ? getPreviewKey(newPath) : '';
            if (oldKey && previewIndex.get(oldKey) === tabId) {
                previewIndex.delete(oldKey);
            }
            if (newKey) {
                previewIndex.set(newKey, tabId);
            }
            if (tabs[tabId]) {
                tabs[tabId].previewPath = newPath;
                tabs[tabId].previewKey = newKey;
            }
        }

        function sanitizeFileName(name) {
            return String(name || '').trim().replace(/^\.+$/, '').replace(/[\\/]/g, '');
        }

        function ensureFileExt(name, ext) {
            if (!name) return `untitled.${ext}`;
            if (name.includes('.')) return name;
            return `${name}.${ext}`;
        }

        function updatePreviewTabTitle(container, fileName, isDirty = false) {
            const tabId = container.id.replace('instance-', '');
            const link = document.getElementById(`link-${tabId}`);
            if (!link) return;
            const title = `Preview: ${fileName}${isDirty ? '*' : ''}`;
            const span = link.querySelector('span');
            if (span) span.textContent = title;
            link.title = title;
        }

        function getMimeTypeByName(name) {
            const ext = name.split('.').pop().toLowerCase();
            const mimeMap = {
                jpg: 'image/jpeg',
                jpeg: 'image/jpeg',
                png: 'image/png',
                gif: 'image/gif',
                webp: 'image/webp',
                svg: 'image/svg+xml',
                mp4: 'video/mp4',
                webm: 'video/webm',
                ogg: 'application/ogg',
                mp3: 'audio/mpeg',
                wav: 'audio/wav',
                pdf: 'application/pdf',
                txt: 'text/plain',
                py: 'text/x-python',
                md: 'text/markdown',
                html: 'text/html',
                htm: 'text/html',
                js: 'text/javascript',
                css: 'text/css',
                json: 'application/json',
                csv: 'text/csv',
                xml: 'application/xml',
                zip: 'application/zip',
                docx: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                xlsx: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
            };
            return mimeMap[ext] || 'application/octet-stream';
        }

        function buildRawFileUrl(path, name, includeMeta = false) {
            const params = new URLSearchParams({ sid: sid, path: path });
            if (includeMeta) {
                params.set('name', name);
                params.set('mime', getMimeTypeByName(name));
            }
            return `sftp/raw?${params.toString()}`;
        }

        function renderPreview(container, data) {
            const { path, name } = data;
            const url = buildRawFileUrl(path, name);
            const ext = name.split('.').pop().toLowerCase();
            container.classList.remove('editor-mode');

            if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(ext)) {
                container.innerHTML = `<img src="${url}" loading="lazy">`;
            } else if (['mp4', 'webm', 'ogg'].includes(ext)) {
                container.innerHTML = `<video src="${url}" controls autoplay></video>`;
            } else if (['mp3', 'wav', 'ogg'].includes(ext)) {
                container.innerHTML = `<audio src="${url}" controls autoplay class="w-75"></audio>`;
            } else if (ext === 'pdf') {
                renderPdfPreview(container, data);
            } else if (ext === 'docx') {
                renderDocxPreview(container, data);
            } else if (ext === 'xlsx') {
                renderXlsxPreview(container, data);
            } else if (ext === 'md') {
                renderMarkdownEditor(container, data);
            } else if (isEditableTextExt(ext)) {
                renderTextEditor(container, data);
            } else {
                container.innerHTML = `<div class="text-warning"><i class="bi bi-exclamation-triangle me-2"></i> Preview not supported.</div>`;
            }
        }

        function renderPdfPreview(container, data) {
            const baseUrl = buildRawFileUrl(data.path, data.name);
            const pdfUrl = `${baseUrl}#view=FitH`;
            const fallbackUrl = buildRawFileUrl(data.path, data.name, true);
            const frameId = `pdf-frame-${++previewEditorCounter}`;
            const statusId = `pdf-status-${previewEditorCounter}`;
            const openBtnId = `pdf-open-${previewEditorCounter}`;
            let loaded = false;

            container.innerHTML = `
                <div class="pdf-preview-wrap">
                    <div class="pdf-preview-toolbar">
                        <div class="text-editor-name text-truncate" title="${escapeHtml(data.name)}">${escapeHtml(data.name)}</div>
                        <button id="${openBtnId}" class="btn btn-sm btn-outline-secondary">Open In New Tab</button>
                    </div>
                    <div id="${statusId}" class="pdf-preview-status">Loading PDF preview...</div>
                    <iframe id="${frameId}" class="pdf-preview-frame" src="${pdfUrl}"></iframe>
                </div>
            `;

            const statusEl = document.getElementById(statusId);
            const frameEl = document.getElementById(frameId);
            const openBtn = document.getElementById(openBtnId);

            openBtn.addEventListener('click', () => {
                window.open(fallbackUrl, '_blank');
            });

            frameEl.addEventListener('load', () => {
                loaded = true;
                statusEl.textContent = '';
            });

            setTimeout(() => {
                if (loaded) return;
                statusEl.textContent = 'If preview is blocked, use "Open In New Tab".';
            }, 3000);
        }

        function renderOfficeFallback(statusEl, fallbackUrl, errMsg) {
            statusEl.innerHTML = `<span class="text-warning">${escapeHtml(errMsg)}</span> <button class="btn btn-sm btn-outline-secondary ms-2">Open In New Tab</button>`;
            const btn = statusEl.querySelector('button');
            if (btn) btn.addEventListener('click', () => window.open(fallbackUrl, '_blank'));
        }

        async function renderDocxPreview(container, data) {
            const fallbackUrl = buildRawFileUrl(data.path, data.name, true);
            const sourceUrl = buildRawFileUrl(data.path, data.name);
            const bodyId = `office-body-${++previewEditorCounter}`;
            const statusId = `office-status-${previewEditorCounter}`;
            const openBtnId = `office-open-${previewEditorCounter}`;
            container.innerHTML = `
                <div class="office-preview-wrap">
                    <div class="office-preview-toolbar">
                        <div class="text-editor-name text-truncate" title="${escapeHtml(data.name)}">${escapeHtml(data.name)}</div>
                        <button id="${openBtnId}" class="btn btn-sm btn-outline-secondary">Open In New Tab</button>
                    </div>
                    <div id="${statusId}" class="office-preview-status">Loading DOCX preview...</div>
                    <div id="${bodyId}" class="office-preview-body"></div>
                </div>
            `;
            const statusEl = document.getElementById(statusId);
            document.getElementById(openBtnId).addEventListener('click', () => window.open(fallbackUrl, '_blank'));
            const bodyEl = document.getElementById(bodyId);
            if (!window.docx || typeof window.docx.renderAsync !== 'function') {
                renderOfficeFallback(statusEl, fallbackUrl, 'DOCX parser is not available.');
                return;
            }
            try {
                const res = await fetch(sourceUrl, { credentials: 'same-origin' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const buf = await res.arrayBuffer();
                await window.docx.renderAsync(buf, bodyEl, null, {
                    className: 'docx-preview',
                    inWrapper: true,
                    ignoreWidth: false,
                    ignoreHeight: true
                });
                statusEl.textContent = '';
            } catch (err) {
                renderOfficeFallback(statusEl, fallbackUrl, `DOCX preview failed: ${err.message || err}`);
            }
        }

        function buildXlsxTableHtml(rows) {
            const safeRows = Array.isArray(rows) ? rows : [];
            if (!safeRows.length) return '<div class="text-warning">No data in this sheet.</div>';
            const maxCols = safeRows.reduce((m, r) => Math.max(m, Array.isArray(r) ? r.length : 0), 0);
            const header = Array.from({ length: maxCols }, (_, i) => `<th>${String.fromCharCode(65 + (i % 26))}${i >= 26 ? Math.floor(i / 26) : ''}</th>`).join('');
            const body = safeRows.map((row) => {
                const cells = Array.from({ length: maxCols }, (_, i) => `<td>${escapeHtml(row && row[i] != null ? String(row[i]) : '')}</td>`).join('');
                return `<tr>${cells}</tr>`;
            }).join('');
            return `<div class="xlsx-table-wrap"><table class="xlsx-table"><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table></div>`;
        }

        async function renderXlsxPreview(container, data) {
            const fallbackUrl = buildRawFileUrl(data.path, data.name, true);
            const sourceUrl = buildRawFileUrl(data.path, data.name);
            const statusId = `office-status-${++previewEditorCounter}`;
            const bodyId = `office-body-${previewEditorCounter}`;
            const tabsId = `office-tabs-${previewEditorCounter}`;
            const openBtnId = `office-open-${previewEditorCounter}`;
            container.innerHTML = `
                <div class="office-preview-wrap">
                    <div class="office-preview-toolbar">
                        <div class="text-editor-name text-truncate" title="${escapeHtml(data.name)}">${escapeHtml(data.name)}</div>
                        <button id="${openBtnId}" class="btn btn-sm btn-outline-secondary">Open In New Tab</button>
                    </div>
                    <div id="${statusId}" class="office-preview-status">Loading XLSX preview...</div>
                    <div class="office-preview-body">
                        <div id="${tabsId}" class="xlsx-sheet-tabs"></div>
                        <div id="${bodyId}"></div>
                    </div>
                </div>
            `;
            const statusEl = document.getElementById(statusId);
            document.getElementById(openBtnId).addEventListener('click', () => window.open(fallbackUrl, '_blank'));
            if (!window.XLSX) {
                renderOfficeFallback(statusEl, fallbackUrl, 'XLSX parser is not available.');
                return;
            }
            try {
                const res = await fetch(sourceUrl, { credentials: 'same-origin' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const buf = await res.arrayBuffer();
                const wb = XLSX.read(buf, { type: 'array' });
                const tabsEl = document.getElementById(tabsId);
                const bodyEl = document.getElementById(bodyId);
                if (!wb.SheetNames || !wb.SheetNames.length) {
                    bodyEl.innerHTML = '<div class="text-warning">Workbook is empty.</div>';
                    statusEl.textContent = '';
                    return;
                }
                const showSheet = (sheetName) => {
                    const ws = wb.Sheets[sheetName];
                    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                    bodyEl.innerHTML = buildXlsxTableHtml(rows);
                    Array.from(tabsEl.querySelectorAll('button')).forEach((btn) => {
                        btn.classList.toggle('active', btn.dataset.sheet === sheetName);
                    });
                };
                wb.SheetNames.forEach((sheetName, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `btn btn-sm btn-outline-secondary${idx === 0 ? ' active' : ''}`;
                    btn.textContent = sheetName;
                    btn.dataset.sheet = sheetName;
                    btn.addEventListener('click', () => showSheet(sheetName));
                    tabsEl.appendChild(btn);
                });
                showSheet(wb.SheetNames[0]);
                statusEl.textContent = '';
            } catch (err) {
                renderOfficeFallback(statusEl, fallbackUrl, `XLSX preview failed: ${err.message || err}`);
            }
        }

        async function renderMermaidIn(viewer) {
            if (typeof mermaid === 'undefined') return;
            if (!mermaidInitialized) {
                mermaid.initialize({ startOnLoad: false, securityLevel: 'strict', theme: 'dark' });
                mermaidInitialized = true;
            }
            const codeBlocks = Array.from(viewer.querySelectorAll('pre > code.language-mermaid'));
            for (const codeEl of codeBlocks) {
                const pre = codeEl.parentElement;
                const box = document.createElement('div');
                box.className = 'mermaid';
                box.textContent = codeEl.textContent || '';
                pre.replaceWith(box);
            }
            const nodes = Array.from(viewer.querySelectorAll('.mermaid'));
            if (nodes.length === 0) return;
            try {
                await mermaid.run({ nodes: nodes });
            } catch (e) {
                nodes.forEach(node => {
                    const err = document.createElement('div');
                    err.className = 'mermaid-error';
                    err.textContent = `Mermaid render error:\n${e.message || e}`;
                    node.replaceWith(err);
                });
            }
        }

        function renderMarkdownHtml(text) {
            if (typeof marked === 'undefined' || typeof DOMPurify === 'undefined') {
                return '<div class="text-warning">Markdown renderer is unavailable.</div>';
            }
            marked.setOptions({ gfm: true, breaks: true });
            const rawHtml = marked.parse(text || '');
            return DOMPurify.sanitize(rawHtml);
        }

        async function renderMarkdownEditor(container, data) {
            const editorId = `md-editor-${++previewEditorCounter}`;
            const statusId = `md-status-${previewEditorCounter}`;
            const saveBtnId = `md-save-${previewEditorCounter}`;
            const fileNameId = `md-name-${previewEditorCounter}`;
            const lineNoId = `md-lineno-${previewEditorCounter}`;
            const viewerId = `md-viewer-${previewEditorCounter}`;
            const readBtnId = `md-read-${previewEditorCounter}`;
            const editBtnId = `md-edit-${previewEditorCounter}`;
            const editorBodyId = `md-editor-body-${previewEditorCounter}`;
            const pathInfo = splitRemotePath(data.path);
            const baseDir = pathInfo.dir;
            const initialName = pathInfo.name || data.name || 'untitled.md';

            container.classList.add('editor-mode');
            container.innerHTML = `
                <div class="text-editor-wrap">
                    <div class="text-editor-toolbar">
                        <div class="d-flex align-items-center gap-2 flex-grow-1 overflow-hidden">

        function switchTab(id) {
            if (activeTabId === id) return;
            if (activeTabId && tabs[activeTabId]) {
                tabs[activeTabId].element.classList.remove('active');
                document.getElementById(`link-${activeTabId}`).classList.remove('active');
            }
            activeTabId = id;
            if (tabs[id]) {
                tabs[id].element.classList.add('active');
                document.getElementById(`link-${id}`).classList.add('active');
                if (tabs[id].type === 'terminal') {
                    tabs[id].term.focus();
                    fitTerminalById(id);
                }
            }
        }

        function closeTab(id) {
            if (!tabs[id]) return;
            const closing = tabs[id];
            if (closing.type === 'preview' && closing.previewKey && previewIndex.get(closing.previewKey) === id) {
                previewIndex.delete(closing.previewKey);
            }
            if (tabs[id].type === 'terminal') {
                if (tabs[id].socket.readyState === WebSocket.OPEN) tabs[id].socket.close();
                tabs[id].term.dispose();
            } else {
                tabs[id].element.querySelectorAll('video, audio').forEach(m => { m.pause(); m.src = ""; });
                tabs[id].element.innerHTML = '';
            }
            tabs[id].element.remove();
            const navItem = document.getElementById(`nav-item-${id}`);
            if (navItem) navItem.remove();
            delete tabs[id];

            if (activeTabId === id) {
                activeTabId = null;
                const remainingIds = Object.keys(tabs);
                if (remainingIds.length > 0) {
                    switchTab(remainingIds[remainingIds.length - 1]);
                } else if (sid) {
                    logout();
                }
            }
        }

            if (activeTabId && tabs[activeTabId] && tabs[activeTabId].type === 'terminal') {
                const { socket, term } = tabs[activeTabId];
                if (socket.readyState === WebSocket.OPEN) {
                    socket.send(textEncoder.encode(data));
                    term.focus();
                }
            }

            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const container = document.getElementById('main-container');
            const containerWidth = container.offsetWidth;
            const leftWidth = e.clientX;
            const rightWidth = containerWidth - leftWidth - resizer.offsetWidth;
            
            if (leftWidth > 200 && rightWidth > 150) {
                terminalArea.style.flex = 'none';
                terminalArea.style.width = `${leftWidth}px`;
                lastTerminalWidth = terminalArea.style.width;
                fileExplorer.style.flex = '1';
                
                if (activeTabId && tabs[activeTabId]) {
                    fitActiveTerminal();

        let currentExplorerPath = '';

        function normalizePath(pathStr) {
            const parts = String(pathStr || '/').split('/');
            const out = [];
            for (const part of parts) {
                if (!part || part === '.') continue;
                if (part === '..') {
                    if (out.length > 0) out.pop();
                    continue;
                }
                out.push(part);
            }
            return '/' + out.join('/');
        }

        function normalizePathWithinHome(pathStr) {
            const root = normalizePath(homeRoot || '/');
            let p = String(pathStr || root).trim();
            if (!p) p = root;
            if (!p.startsWith('/')) {
                p = normalizePath(joinRemotePath(currentExplorerPath || root, p));
            } else {
                p = normalizePath(p);
            }
            if (p === root || p.startsWith(root + '/')) return p;
            return root;
        }

        function setExplorerPath(pathStr) {
            currentExplorerPath = normalizePathWithinHome(pathStr);
            updatePathDisplay(currentExplorerPath);
        }

        async function deleteSelected() {
            if (selectedItems.size === 0) return;
            if (!confirm(`Delete ${selectedItems.size} selected items?`)) return;

            const itemsToDelete = Array.from(selectedItems);
            let successCount = 0;
            let failCount = 0;

            for (const fullPath of itemsToDelete) {
                try {
                    const resp = await fetch('sftp/action', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sid: sid,
                            action: 'delete',
                            path: fullPath
                        })
                    });
                    if (resp.ok) successCount++;
                    else failCount++;
                } catch (e) {
                    failCount++;
                }
            }

            selectedItems.clear();
            updateDeleteButton();
            refreshFiles();
            if (failCount > 0) {
                alert(`Deletion finished: ${successCount} success, ${failCount} failed.`);
            }
        }

        async function refreshFiles() {
            const listContainer = document.getElementById('explorer-list');
            listContainer.innerHTML = '<div style="padding: 10px; color: #888;">Loading...</div>';
            
            selectedItems.clear();
            updateDeleteButton();
            saveCurrentPath();

            try {
                const resp = await fetch('sftp/list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sid: sid,
                        path: normalizePathWithinHome(currentExplorerPath || homeRoot)
                    })
                });
                
                if (!resp.ok) throw new Error(await resp.text());
                
                cachedFiles = await resp.json();
                // Clear filter when refreshing
                document.getElementById('file-filter').value = '';
                renderFileList(cachedFiles);
            } catch (e) {
                listContainer.innerHTML = `<div style="padding: 10px; color: #f44;">Error: ${e.message}</div>`;
